name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build CosmosDB.InMemoryEmulator.sln --configuration Release

      - name: Test
        run: dotnet test CosmosDB.InMemoryEmulator.sln --configuration Release --no-build --verbosity normal
