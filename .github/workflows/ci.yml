name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build CosmosDB.InMemoryEmulator.sln --configuration Release

      - name: Test Unit (net8.0)
        run: dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Unit --configuration Release --no-build --verbosity normal --framework net8.0

      - name: Test Integration (net8.0)
        run: dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Integration --configuration Release --no-build --verbosity normal --framework net8.0

      - name: Test Unit (net10.0)
        run: dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Unit --configuration Release --no-build --verbosity normal --framework net10.0

      - name: Test Integration (net10.0)
        run: dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Integration --configuration Release --no-build --verbosity normal --framework net10.0

  performance-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [net8.0, net10.0]
        rps: [50, 200]
        duration: [60, 300]
        run: [1, 2]
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build CosmosDB.InMemoryEmulator.sln --configuration Release

      - name: Performance Tests (${{ matrix.framework }}, ${{ matrix.rps }}rps, ${{ matrix.duration }}s, run ${{ matrix.run }})
        env:
          LOAD_TEST_RPS: ${{ matrix.rps }}
          LOAD_TEST_DURATION_SECONDS: ${{ matrix.duration }}
        run: |
          dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Performance --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed" --filter "FullyQualifiedName~Performance.LoadTests." --framework ${{ matrix.framework }} 2>&1 | tee test-output.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ matrix.framework }}-${{ matrix.rps }}rps-${{ matrix.duration }}s-run${{ matrix.run }}
          path: test-output.txt
          retention-days: 1

  performance-summary:
    runs-on: ubuntu-latest
    needs: performance-tests
    if: always()
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: perf-*
          path: results

      - name: Summarize averaged results
        run: |
          cat << 'SCRIPT' > summarize.py
          import os, re, sys
          from collections import defaultdict

          scenario_pattern = re.compile(r'║\s+(.+?(?:\(\d+/\d+\)))\s+║')
          metrics_pattern = re.compile(
              r'║\s+(Throughput|Mean latency|P50 latency|P95 latency|P99 latency|Max latency)\s*:\s*([\d.]+)'
          )

          # Collect metrics grouped by (config, scenario)
          # Key: (config_key, scenario_name) -> metric_name -> [values]
          configs = defaultdict(lambda: defaultdict(list))

          results_dir = "results"
          for artifact_dir in sorted(os.listdir(results_dir)):
              match = re.match(r'perf-(net[\d.]+)-(\d+)rps-(\d+)s-run(\d+)', artifact_dir)
              if not match:
                  continue
              framework, rps, duration, run = match.groups()
              config_key = f"{framework} / {rps}rps / {duration}s"

              filepath = os.path.join(results_dir, artifact_dir, "test-output.txt")
              if not os.path.exists(filepath):
                  print(f"WARNING: Missing {filepath}", file=sys.stderr)
                  continue

              with open(filepath) as f:
                  lines = f.readlines()

              current_scenario = "Unknown"
              for line in lines:
                  sm = scenario_pattern.search(line)
                  if sm:
                      current_scenario = sm.group(1).strip()
                  mm = metrics_pattern.search(line)
                  if mm:
                      metric_name = mm.group(1).strip()
                      value = float(mm.group(2))
                      key = (config_key, current_scenario)
                      configs[key][metric_name].append(value)

          metric_order = ["Throughput", "Mean latency", "P50 latency", "P95 latency", "P99 latency", "Max latency"]

          # Group by scenario for separate tables
          scenarios = sorted(set(s for _, s in configs.keys()))

          for scenario in scenarios:
              print(f"# {scenario} (Averaged over 2 runs)")
              print()
              print("| Config | Throughput (ops/s) | Mean (ms) | P50 (ms) | P95 (ms) | P99 (ms) | Max (ms) |")
              print("|--------|-------------------|-----------|----------|----------|----------|----------|")

              for key in sorted(configs.keys()):
                  cfg, scn = key
                  if scn != scenario:
                      continue
                  metrics = configs[key]
                  row = [cfg]
                  for metric in metric_order:
                      values = metrics.get(metric, [])
                      if values:
                          avg = sum(values) / len(values)
                          row.append(f"{avg:.3f}" if "latency" in metric.lower() else f"{avg:.1f}")
                      else:
                          row.append("N/A")
                  print("| " + " | ".join(row) + " |")
              print()

          # Per-run details grouped by scenario
          print("## Per-Run Details")
          print()
          for artifact_dir in sorted(os.listdir(results_dir)):
              match = re.match(r'perf-(net[\d.]+)-(\d+)rps-(\d+)s-run(\d+)', artifact_dir)
              if not match:
                  continue
              framework, rps, duration, run = match.groups()
              filepath = os.path.join(results_dir, artifact_dir, "test-output.txt")
              if not os.path.exists(filepath):
                  continue
              with open(filepath) as f:
                  lines = f.readlines()
              current_scenario = "Unknown"
              scenario_metrics = {}
              for line in lines:
                  sm = scenario_pattern.search(line)
                  if sm:
                      if scenario_metrics:
                          detail = ", ".join(f"{k}: {v}" for k, v in scenario_metrics.items())
                          print(f"- **{framework} {rps}rps {duration}s run{run} — {current_scenario}**: {detail}")
                      current_scenario = sm.group(1).strip()
                      scenario_metrics = {}
                  mm = metrics_pattern.search(line)
                  if mm:
                      scenario_metrics[mm.group(1).strip()] = float(mm.group(2))
              if scenario_metrics:
                  detail = ", ".join(f"{k}: {v}" for k, v in scenario_metrics.items())
                  print(f"- **{framework} {rps}rps {duration}s run{run} — {current_scenario}**: {detail}")
          SCRIPT
          python3 summarize.py | tee "$GITHUB_STEP_SUMMARY"
