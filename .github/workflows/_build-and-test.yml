name: Build & Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: build
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            src/**/bin/**
            src/**/obj/**
            tests/**/bin/**
            tests/**/obj/**
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [net8.0, net10.0]
        project: [Unit, Integration]
    name: test (${{ matrix.framework }}, ${{ matrix.project }})
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build
        with:
          build: false

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Debug — verify artifact layout
        run: |
          echo "=== test project bin ==="
          ls -la tests/CosmosDB.InMemoryEmulator.Tests.${{ matrix.project }}/bin/Release/${{ matrix.framework }}/ 2>&1 | head -20
          echo "=== test project obj ==="
          ls tests/CosmosDB.InMemoryEmulator.Tests.${{ matrix.project }}/obj/ 2>&1 | head -10
          echo "=== deps.json snippet ==="
          head -30 tests/CosmosDB.InMemoryEmulator.Tests.${{ matrix.project }}/bin/Release/${{ matrix.framework }}/CosmosDB.InMemoryEmulator.Tests.${{ matrix.project }}.deps.json 2>&1 || echo "deps.json not found"

      - name: ${{ matrix.project }} Tests
        run: dotnet test tests/CosmosDB.InMemoryEmulator.Tests.${{ matrix.project }} --configuration Release --no-build --verbosity normal --framework ${{ matrix.framework }}
