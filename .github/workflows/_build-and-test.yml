name: Build & Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        framework: [net8.0, net10.0]
    name: build (${{ matrix.framework }})
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build
        with:
          build-args: --framework ${{ matrix.framework }}

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.framework }}
          path: |
            src/**/bin/Release/${{ matrix.framework }}/**
            src/**/obj/**
            tests/**/bin/Release/${{ matrix.framework }}/**
            tests/**/obj/**
          retention-days: 1

  test-unit:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [net8.0, net10.0]
        shard:
          # Shard 1: classes starting with B-R (excluding Q,S,T,V,W) ≈ 3734 tests
          - id: 1
            filter: "FullyQualifiedName~.Unit.B|FullyQualifiedName~.Unit.C|FullyQualifiedName~.Unit.D|FullyQualifiedName~.Unit.E|FullyQualifiedName~.Unit.F|FullyQualifiedName~.Unit.H|FullyQualifiedName~.Unit.I|FullyQualifiedName~.Unit.J|FullyQualifiedName~.Unit.L|FullyQualifiedName~.Unit.P|FullyQualifiedName~.Unit.R"
          # Shard 2: everything else (Q,S,T,V,W + any future letters) ≈ 3757 tests
          - id: 2
            filter: "FullyQualifiedName!~.Unit.B&FullyQualifiedName!~.Unit.C&FullyQualifiedName!~.Unit.D&FullyQualifiedName!~.Unit.E&FullyQualifiedName!~.Unit.F&FullyQualifiedName!~.Unit.H&FullyQualifiedName!~.Unit.I&FullyQualifiedName!~.Unit.J&FullyQualifiedName!~.Unit.L&FullyQualifiedName!~.Unit.P&FullyQualifiedName!~.Unit.R"
    name: unit (${{ matrix.framework }}, ${{ matrix.shard.id }}/2)
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build
        with:
          build: false

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ matrix.framework }}

      - name: Restore executable permissions
        run: find . -path '*/bin/Release/*' -type f -exec chmod +x {} +

      - name: Unit Tests
        run: dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Unit --configuration Release --no-build --verbosity normal --framework ${{ matrix.framework }} --filter "${{ matrix.shard.filter }}"

  test-integration:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [net8.0, net10.0]
    name: integration (${{ matrix.framework }})
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build
        with:
          build: false

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ matrix.framework }}

      - name: Restore executable permissions
        run: find . -path '*/bin/Release/*' -type f -exec chmod +x {} +

      - name: Integration Tests
        run: dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Integration --configuration Release --no-build --verbosity normal --framework ${{ matrix.framework }}
