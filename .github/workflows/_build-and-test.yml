name: Build & Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: build
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            src/**/bin/**
            src/**/obj/**
            tests/**/bin/**
            tests/**/obj/**
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [net8.0, net10.0]
        project: [Unit, Integration]
    name: test (${{ matrix.framework }}, ${{ matrix.project }})
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build
        with:
          build: false

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Restore executable permissions
        run: find . -path '*/bin/Release/*' -type f -exec chmod +x {} +

      - name: ${{ matrix.project }} Tests
        run: dotnet test tests/CosmosDB.InMemoryEmulator.Tests.${{ matrix.project }} --configuration Release --no-build --verbosity normal --framework ${{ matrix.framework }}
