name: Windows Parity Subset

on:
  workflow_call:

permissions:
  contents: read

# Same 4-class subset used in ci.yml and release.yml gates.
# Intentionally kept small — these classes exercise core CRUD, TTL, batch,
# and advanced query paths without the volume that causes emulator infra
# failures (partition exhaustion / 503s) on the full suite.
env:
  PARITY_FILTER: 'FullyQualifiedName~FakeCosmosHandlerCrudTests|FullyQualifiedName~FakeCosmosHandlerTtlTests|FullyQualifiedName~FakeCosmosHandlerBatchTests|FullyQualifiedName~FakeCosmosHandlerQueryAdvancedTests'

jobs:
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build

      - name: Start Cosmos DB Windows Emulator
        shell: pwsh
        run: |
          $emulatorExe = "C:\Program Files\Azure Cosmos DB Emulator\Microsoft.Azure.Cosmos.Emulator.exe"
          if (-not (Test-Path $emulatorExe)) {
            $emulatorExe = "C:\Program Files\Azure Cosmos DB Emulator\CosmosDB.Emulator.exe"
          }
          if (-not (Test-Path $emulatorExe)) {
            Write-Error "Cosmos DB Emulator not found on runner image"
            exit 1
          }
          Start-Process -FilePath $emulatorExe -ArgumentList "/NoExplorer /NoFirewall /PartitionCount=3"

      - uses: ./.github/actions/wait-for-emulator

      - name: Run Tests (emulator-windows, parity subset)
        shell: pwsh
        run: ./scripts/run-tests.ps1 -Target emulator-windows -Project integration -Filter $env:PARITY_FILTER

      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-windows-parity-${{ github.run_id }}
          path: test-results/
          retention-days: 7
