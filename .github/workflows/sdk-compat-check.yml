name: SDK Compatibility Check

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'Specific SDK version to test (leave empty for latest)'
        required: false
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  compatibility-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: latest-stable
            prerelease: false
            os: ubuntu-latest
          - name: latest-preview
            prerelease: true
            os: ubuntu-latest
          - name: latest-stable-windows
            prerelease: false
            os: windows-latest

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build
        with:
          build: false

      - name: Determine SDK version
        id: sdk-version
        shell: bash
        run: |
          if [ -n "${{ inputs.sdk_version }}" ]; then
            VERSION="${{ inputs.sdk_version }}"
          elif [ "${{ matrix.prerelease }}" = "true" ]; then
            VERSION=$(dotnet package search Microsoft.Azure.Cosmos \
              --prerelease --format json \
              | jq -r '.searchResult[0].packages[0].latestVersion')
          else
            VERSION=$(dotnet package search Microsoft.Azure.Cosmos \
              --format json \
              | jq -r '.searchResult[0].packages[0].latestVersion')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "## SDK Version: $VERSION" >> $GITHUB_STEP_SUMMARY

      - name: Override Cosmos SDK version
        run: |
          dotnet add src/CosmosDB.InMemoryEmulator/CosmosDB.InMemoryEmulator.csproj \
            package Microsoft.Azure.Cosmos \
            --version ${{ steps.sdk-version.outputs.version }}

      - name: Build
        run: dotnet build --configuration Release

      - name: Run SDK compatibility self-test
        id: compat-test
        run: |
          dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Unit \
            --configuration Release --no-build \
            --framework net8.0 \
            --filter "FullyQualifiedName~SdkVersionDriftDetectorTests" \
            -v normal \
            --logger "trx;LogFileName=compat-results.trx"

      - name: Run full unit test suite
        id: unit-tests
        continue-on-error: true
        run: |
          dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Unit \
            --configuration Release --no-build \
            --framework net8.0 \
            -v quiet \
            --logger "trx;LogFileName=unit-results.trx"

      - name: Run integration test suite
        id: integration-tests
        continue-on-error: true
        run: |
          dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Integration \
            --configuration Release --no-build \
            --framework net8.0 \
            -v quiet \
            --logger "trx;LogFileName=integration-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.name }}
          path: |
            **/TestResults/*.trx
          retention-days: 30

      - name: Summarise results
        if: always()
        shell: bash
        run: |
          echo "### Results for ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- SDK Version: ${{ steps.sdk-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Compat test: ${{ steps.compat-test.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: ${{ steps.unit-tests.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests: ${{ steps.integration-tests.outcome }}" >> $GITHUB_STEP_SUMMARY

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.sdk-version.outputs.version }}';
            const matrixName = '${{ matrix.name }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Check if an issue already exists for this SDK version
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'sdk-compatibility',
              state: 'open',
            });

            const alreadyReported = existingIssues.data.some(
              issue => issue.title.includes(version)
            );

            if (!alreadyReported) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `SDK compat break: Microsoft.Azure.Cosmos ${version} (${matrixName})`,
                body: [
                  `## SDK Compatibility Break Detected`,
                  ``,
                  `The scheduled SDK compatibility check failed against **Microsoft.Azure.Cosmos v${version}** on **${matrixName}**.`,
                  ``,
                  `### Action Items`,
                  `1. Review the [CI run](${runUrl}) to identify which tests failed`,
                  `2. Determine urgency:`,
                  `   - **latest-stable**: Users may already be affected — high priority`,
                  `   - **latest-preview**: We have time before this hits users — medium priority`,
                  `3. Fix the incompatibility and add regression tests`,
                  `4. Update \`MaxTestedSdkVersion\` in \`FakeCosmosHandler.cs\``,
                  `5. If the fix requires a strategy override, document it in the wiki`,
                  ``,
                  `### Fragile Areas to Check`,
                  `- Query plan format (\`DefaultQueryPlanStrategy\`)`,
                  `- ORDER BY / GROUP BY response wrapping`,
                  `- HybridRow batch schemas (\`DefaultBatchSchemaStrategy\`)`,
                  `- Continuation token format`,
                  `- New \`x-ms-*\` headers (check \`UnrecognisedHeaders\`)`,
                ].join('\n'),
                labels: ['sdk-compatibility', 'bug'],
              });
            }

  update-max-tested-version:
    needs: compatibility-check
    if: success()
    runs-on: ubuntu-latest
    name: Update MaxTestedSdkVersion

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build
        with:
          dotnet-versions: '8.0.x'
          build: false

      - name: Determine latest stable SDK version
        id: sdk-version
        shell: bash
        run: |
          if [ -n "${{ inputs.sdk_version }}" ]; then
            VERSION="${{ inputs.sdk_version }}"
          else
            VERSION=$(dotnet package search Microsoft.Azure.Cosmos \
              --format json \
              | jq -r '.searchResult[0].packages[0].latestVersion')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Parse version components
        id: parse
        shell: bash
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.sdk-version.outputs.version }}"
          # Pad to 4-component Version format
          echo "version_literal=new($MAJOR, $MINOR, ${PATCH:-0}, 0)" >> $GITHUB_OUTPUT
          echo "branch_name=auto/bump-max-sdk-${{ steps.sdk-version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check
        shell: bash
        run: |
          CURRENT=$(grep -oP 'MaxTestedSdkVersion = new\(\K[^)]+' src/CosmosDB.InMemoryEmulator/FakeCosmosHandler.cs)
          if [ "$CURRENT" = "${{ steps.parse.outputs.version_literal }}" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
          else
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update MaxTestedSdkVersion
        if: steps.check.outputs.needed == 'true'
        shell: bash
        run: |
          sed -i "s/MaxTestedSdkVersion = new([^)]*)/MaxTestedSdkVersion = new(${{ steps.parse.outputs.version_literal }})/" \
            src/CosmosDB.InMemoryEmulator/FakeCosmosHandler.cs

      - name: Create Pull Request
        if: steps.check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.parse.outputs.branch_name }}
          commit-message: "chore: bump MaxTestedSdkVersion to ${{ steps.sdk-version.outputs.version }}"
          title: "chore: bump MaxTestedSdkVersion to ${{ steps.sdk-version.outputs.version }}"
          body: |
            The weekly SDK compatibility check passed with **Microsoft.Azure.Cosmos v${{ steps.sdk-version.outputs.version }}**.

            This PR updates `MaxTestedSdkVersion` so users on this SDK version no longer see a warning.

            - All unit tests passed
            - All integration tests passed
            - No new unrecognised headers detected
          labels: sdk-compatibility
