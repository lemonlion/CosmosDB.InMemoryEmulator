name: Rebalance Test Shards

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - uses: ./.github/actions/setup-dotnet-build

      - name: Run unit tests with TRX logging
        shell: pwsh
        run: |
          dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Unit `
            --configuration Release --no-build `
            --framework net8.0 `
            --logger "trx;LogFileName=unit-timings.trx" `
            --results-directory ./test-results

      - name: Generate shard profile
        shell: pwsh
        run: ./scripts/Analyze-TestTimings.ps1 ./test-results/unit-timings.trx

      - name: Check for changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet scripts/shard-profile.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push (branch dispatch)
        if: steps.diff.outputs.changed == 'true' && github.ref != 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/shard-profile.json
          git commit -m "chore: rebalance test shard profile"
          git push

      - name: Create PR (main / scheduled)
        if: steps.diff.outputs.changed == 'true' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/rebalance-shards-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add scripts/shard-profile.json
          git commit -m "chore: rebalance test shard profile"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: rebalance test shard profile" \
            --body "Auto-generated by the **Rebalance Test Shards** workflow.

          The unit test timings have drifted enough to warrant updating \`scripts/shard-profile.json\`.

          Review the updated shard assignments and merge if they look reasonable." \
            --base main \
            --head "$BRANCH"

      - name: Summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "### ✅ Shard profile updated" >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "A pull request has been created." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Changes pushed to \`${{ github.ref_name }}\`." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "### ✅ Shard profile is already balanced — no changes needed" >> "$GITHUB_STEP_SUMMARY"
          fi
