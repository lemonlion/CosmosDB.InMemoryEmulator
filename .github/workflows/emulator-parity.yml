name: Emulator Parity Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:
    inputs:
      filter:
        description: 'dotnet test filter expression (overrides default PARITY_FILTER when provided)'
        required: false
        type: string

permissions:
  contents: read

# Single source of truth for which integration test classes run against the
# emulators. Expand this filter (OR with `|`) one class at a time and verify the
# workflow still completes without infra failures (partition exhaustion,
# connection-refused storms, timeouts) before adding the next.
env:
  PARITY_FILTER: ${{ inputs.filter || 'FullyQualifiedName~FakeCosmosHandlerCrudTests|FullyQualifiedName~FakeCosmosHandlerTtlTests|FullyQualifiedName~FakeCosmosHandlerBatchTests|FullyQualifiedName~FakeCosmosHandlerQueryAdvancedTests' }}
  # Note: Linux emulator job is commented out below. See #51 for details:
  #   https://github.com/lemonlion/CosmosDB.InMemoryEmulator/issues/51

jobs:
  test-inmemory:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build

      - name: Run Tests (inmemory)
        shell: pwsh
        run: ./scripts/run-tests.ps1 -Target inmemory -Project integration -Filter $env:PARITY_FILTER

      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-inmemory
          path: test-results/

  # ──────────────────────────────────────────────────────────────────────────────
  # Linux emulator job — DISABLED
  # The Dockerized Linux Cosmos emulator on GitHub Actions runners produces 65s
  # request timeouts (HTTP 408) on PATCH and query operations, causing the job to
  # exceed any reasonable timeout. See #51 for investigation and re-enablement:
  #   https://github.com/lemonlion/CosmosDB.InMemoryEmulator/issues/51
  # ──────────────────────────────────────────────────────────────────────────────
  # test-emulator-linux:
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 45
  #
  #   services:
  #     cosmosdb:
  #       image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator
  #       ports:
  #         - 8081:8081
  #         - 10250-10256:10250-10256
  #       env:
  #         AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 10
  #         AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
  #         AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "127.0.0.1"
  #
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: ./.github/actions/setup-dotnet-build
  #
  #     - uses: ./.github/actions/wait-for-emulator
  #
  #     - name: Run Tests (emulator-linux)
  #       shell: pwsh
  #       run: ./scripts/run-tests.ps1 -Target emulator-linux -Project integration -Filter $env:PARITY_FILTER
  #
  #     - name: Upload TRX
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: trx-emulator-linux
  #         path: test-results/

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-dotnet-build

      - name: Start Cosmos DB Windows Emulator
        shell: pwsh
        run: |
          Write-Host "Starting emulator..."
          $emulatorExe = "C:\Program Files\Azure Cosmos DB Emulator\Microsoft.Azure.Cosmos.Emulator.exe"
          if (-not (Test-Path $emulatorExe)) {
            $emulatorExe = "C:\Program Files\Azure Cosmos DB Emulator\CosmosDB.Emulator.exe"
          }
          if (-not (Test-Path $emulatorExe)) {
            Write-Error "Cosmos DB Emulator not found on runner image"
            exit 1
          }
          Start-Process -FilePath $emulatorExe -ArgumentList "/NoExplorer /NoFirewall /PartitionCount=3"

      - uses: ./.github/actions/wait-for-emulator

      - name: Run Tests (emulator-windows)
        shell: pwsh
        run: ./scripts/run-tests.ps1 -Target emulator-windows -Project integration -Filter $env:PARITY_FILTER

      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-emulator-windows
          path: test-results/

  compare:
    needs: [test-inmemory, test-windows]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Download all TRX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: trx-*
          path: test-results/
          merge-multiple: true

      - name: Parity Report
        shell: pwsh
        run: ./scripts/compare-trx.ps1 -ResultsDir test-results -OutputFormat markdown >> $env:GITHUB_STEP_SUMMARY

      - name: Upload Combined Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-results
          path: test-results/
