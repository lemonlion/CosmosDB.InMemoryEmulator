name: Emulator Parity Validation

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

jobs:
  test-inmemory:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build
        run: dotnet build CosmosDB.InMemoryEmulator.sln --configuration Release

      - name: Run Tests (inmemory)
        shell: pwsh
        run: ./scripts/run-tests.ps1 -Target inmemory -Project integration

      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-inmemory
          path: test-results/

  test-emulator-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      cosmosdb:
        image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator
        ports:
          - 8081:8081
          - 10250-10256:10250-10256
        env:
          AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 3
          AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
          AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "127.0.0.1"

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Wait for Cosmos DB Emulator
        run: |
          echo "Waiting for Cosmos DB Emulator HTTP endpoint..."
          timeout=300
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            status=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:8081/ 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "401" ]; then
              echo "HTTP endpoint ready after ${elapsed}s (HTTP $status)"
              break
            fi
            sleep 5
            elapsed=$((elapsed + 5))
            echo "Still waiting... (${elapsed}s)"
          done
          if [ $elapsed -ge $timeout ]; then
            echo "::error::Cosmos DB Emulator did not start within ${timeout}s"
            exit 1
          fi

      - name: Warm up Cosmos DB Emulator
        run: |
          # The HTTP health endpoint being up does NOT mean the write path is ready.
          # The emulator's partition services need extra time. We warm up by:
          #   1. Creating the test database
          #   2. Pre-creating ALL test containers so no container creation happens during tests
          # This avoids the 503 errors that occur when the emulator degrades under sustained load.

          key="C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
          endpoint="https://localhost:8081"
          timeout=120

          # Helper: generate Cosmos REST API auth header
          cosmos_auth() {
            local verb="$1" resource_type="$2" resource_link="$3" date_str="$4"
            local date_lower=$(echo -n "$date_str" | tr '[:upper:]' '[:lower:]')
            local sig=$(printf "${verb}\n${resource_type}\n${resource_link}\n${date_lower}\n\n" \
              | openssl dgst -sha256 -mac HMAC \
                  -macopt "hexkey:$(echo -n "$key" | base64 -d | xxd -p -c 256)" \
                  -binary | base64 -w 0)
            printf "type=master&ver=1.0&sig=${sig}" \
              | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read()))"
          }

          # Helper: create a container with retry
          create_container() {
            local name="$1" body="$2"
            local elapsed=0
            while [ $elapsed -lt $timeout ]; do
              now=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")
              auth=$(cosmos_auth "post" "colls" "dbs/parity-validation" "$now")
              http_code=$(curl -sk -o /tmp/cosmos-warmup.json -w "%{http_code}" \
                -X POST "${endpoint}/dbs/parity-validation/colls" \
                -H "Authorization: ${auth}" \
                -H "x-ms-version: 2018-12-31" \
                -H "x-ms-date: ${now}" \
                -H "Content-Type: application/json" \
                -d "$body" 2>/dev/null || echo "000")
              if [ "$http_code" = "201" ] || [ "$http_code" = "409" ]; then
                echo "  ✓ ${name} (HTTP $http_code)"
                return 0
              fi
              sleep 5
              elapsed=$((elapsed + 5))
            done
            echo "  ✗ ${name} FAILED after ${timeout}s"
            return 1
          }

          # Step 1: Create the database
          echo "Step 1/2: Creating parity-validation database..."
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            now=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")
            auth=$(cosmos_auth "post" "dbs" "" "$now")
            http_code=$(curl -sk -o /tmp/cosmos-warmup.json -w "%{http_code}" \
              -X POST "${endpoint}/dbs" \
              -H "Authorization: ${auth}" \
              -H "x-ms-version: 2018-12-31" \
              -H "x-ms-date: ${now}" \
              -H "Content-Type: application/json" \
              -d '{"id":"parity-validation"}' 2>/dev/null || echo "000")

            if [ "$http_code" = "201" ] || [ "$http_code" = "409" ]; then
              echo "  Database ready (HTTP $http_code) after ${elapsed}s"
              break
            fi
            echo "  Not ready yet (HTTP $http_code), retrying... (${elapsed}s)"
            sleep 5
            elapsed=$((elapsed + 5))
          done
          if [ $elapsed -ge $timeout ]; then
            echo "::error::Cosmos DB Emulator database creation did not succeed within ${timeout}s"
            exit 1
          fi

          # Step 2: Pre-create all test containers
          # This eliminates container creation during the test run, avoiding 503 errors
          # that occur when the emulator degrades under sustained load.
          echo "Step 2/2: Pre-creating test containers..."
          failed=0
          pk='{"paths":["/partitionKey"],"kind":"Hash"}'

          create_container "test-crud"      "{\"id\":\"test-crud\",\"partitionKey\":${pk}}"      || failed=1
          create_container "harden-crud"    "{\"id\":\"harden-crud\",\"partitionKey\":${pk}}"    || failed=1
          create_container "test-query-adv" "{\"id\":\"test-query-adv\",\"partitionKey\":${pk}}" || failed=1
          create_container "test-linq"      "{\"id\":\"test-linq\",\"partitionKey\":${pk}}"      || failed=1
          create_container "test-batch"     "{\"id\":\"test-batch\",\"partitionKey\":${pk}}"     || failed=1
          create_container "test-bulk"      "{\"id\":\"test-bulk\",\"partitionKey\":${pk}}"      || failed=1
          create_container "test-pk"        "{\"id\":\"test-pk\",\"partitionKey\":${pk}}"        || failed=1
          create_container "containerA"     "{\"id\":\"containerA\",\"partitionKey\":${pk}}"     || failed=1
          create_container "containerB"     "{\"id\":\"containerB\",\"partitionKey\":${pk}}"     || failed=1
          create_container "pknone-test"    "{\"id\":\"pknone-test\",\"partitionKey\":${pk}}"    || failed=1

          create_container "test-ttl" \
            "{\"id\":\"test-ttl\",\"partitionKey\":${pk},\"defaultTtl\":2}" || failed=1

          create_container "num-pk-test" \
            '{"id":"num-pk-test","partitionKey":{"paths":["/numericPk"],"kind":"Hash"}}' || failed=1
          create_container "bool-pk-test" \
            '{"id":"bool-pk-test","partitionKey":{"paths":["/boolPk"],"kind":"Hash"}}' || failed=1

          create_container "composite-test" \
            '{"id":"composite-test","partitionKey":{"paths":["/tenantId","/userId"],"kind":"MultiHash","version":2}}' || failed=1

          if [ $failed -ne 0 ]; then
            echo "::error::Some containers failed to create"
            exit 1
          fi
          echo "All 14 test containers pre-created. Emulator is ready."

      - name: Build
        run: dotnet build CosmosDB.InMemoryEmulator.sln --configuration Release

      - name: Run Tests (emulator-linux)
        shell: pwsh
        run: ./scripts/run-tests.ps1 -Target emulator-linux -Project integration

      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-emulator-linux
          path: test-results/

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install & Start Cosmos DB Windows Emulator
        shell: pwsh
        run: |
          Write-Host "Installing Azure Cosmos DB Emulator..."
          choco install azure-cosmosdb-emulator -y --no-progress
          Write-Host "Starting emulator..."
          $emulatorExe = "C:\Program Files\Azure Cosmos DB Emulator\Microsoft.Azure.Cosmos.Emulator.exe"
          if (-not (Test-Path $emulatorExe)) {
            $emulatorExe = "C:\Program Files\Azure Cosmos DB Emulator\CosmosDB.Emulator.exe"
          }
          Start-Process -FilePath $emulatorExe -ArgumentList "/NoExplorer /NoFirewall /PartitionCount=3"
          # Wait for readiness
          $timeout = 300; $elapsed = 0
          while ($elapsed -lt $timeout) {
            try {
              $r = Invoke-WebRequest -Uri "https://localhost:8081/" -SkipCertificateCheck -SkipHttpErrorCheck -TimeoutSec 5 -ErrorAction Stop
              if ($r.StatusCode -in 200, 401) {
                Write-Host "Emulator ready after ${elapsed}s"
                break
              }
            } catch {}
            Start-Sleep 5; $elapsed += 5
            Write-Host "  Waiting... (${elapsed}s)"
          }
          if ($elapsed -ge $timeout) { Write-Error "Emulator did not start"; exit 1 }

      - name: Warm up Cosmos DB Emulator
        shell: pwsh
        run: |
          # The HTTP health endpoint being up does NOT mean the write path is ready.
          # We warm up by: 1) creating the database, 2) pre-creating ALL test containers.
          # This eliminates container creation during the test run, avoiding 503 errors.
          $key = "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
          $endpoint = "https://localhost:8081"
          $timeout = 120

          function Get-CosmosAuth($verb, $resourceType, $resourceLink, $dateStr) {
            $payload = "${verb}`n${resourceType}`n${resourceLink}`n$($dateStr.ToLowerInvariant())`n`n"
            $hmac = New-Object System.Security.Cryptography.HMACSHA256
            $hmac.Key = [Convert]::FromBase64String($key)
            $sig = [Convert]::ToBase64String($hmac.ComputeHash([Text.Encoding]::UTF8.GetBytes($payload)))
            return [Uri]::EscapeDataString("type=master&ver=1.0&sig=$sig")
          }

          function New-Container($name, $body) {
            $elapsed = 0
            while ($elapsed -lt $timeout) {
              try {
                $now = [DateTime]::UtcNow.ToString("r")
                $auth = Get-CosmosAuth "post" "colls" "dbs/parity-validation" $now
                $headers = @{
                  "Authorization" = $auth
                  "x-ms-version"  = "2018-12-31"
                  "x-ms-date"     = $now
                  "Content-Type"  = "application/json"
                }
                $r = Invoke-WebRequest -Uri "$endpoint/dbs/parity-validation/colls" -Method POST `
                  -Headers $headers -Body $body `
                  -SkipCertificateCheck -SkipHttpErrorCheck -TimeoutSec 10 -ErrorAction Stop
                if ($r.StatusCode -in 201, 409) {
                  Write-Host "  ✓ ${name} (HTTP $($r.StatusCode))"
                  return $true
                }
              } catch { }
              Start-Sleep 5; $elapsed += 5
            }
            Write-Host "  ✗ ${name} FAILED after ${timeout}s"
            return $false
          }

          # Step 1: Create the database
          Write-Host "Step 1/2: Creating parity-validation database..."
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            try {
              $now = [DateTime]::UtcNow.ToString("r")
              $auth = Get-CosmosAuth "post" "dbs" "" $now
              $headers = @{
                "Authorization" = $auth
                "x-ms-version"  = "2018-12-31"
                "x-ms-date"     = $now
                "Content-Type"  = "application/json"
              }
              $r = Invoke-WebRequest -Uri "$endpoint/dbs" -Method POST `
                -Headers $headers -Body '{"id":"parity-validation"}' `
                -SkipCertificateCheck -SkipHttpErrorCheck -TimeoutSec 10 -ErrorAction Stop
              if ($r.StatusCode -in 201, 409) {
                Write-Host "  Database ready (HTTP $($r.StatusCode)) after ${elapsed}s"
                break
              }
              Write-Host "  Not ready yet (HTTP $($r.StatusCode)), retrying... (${elapsed}s)"
            } catch {
              Write-Host "  Request failed: $($_.Exception.Message), retrying... (${elapsed}s)"
            }
            Start-Sleep 5; $elapsed += 5
          }
          if ($elapsed -ge $timeout) { Write-Error "Database creation did not succeed within ${timeout}s"; exit 1 }

          # Step 2: Pre-create all test containers
          Write-Host "Step 2/2: Pre-creating test containers..."
          $failed = $false
          $pk = '{"paths":["/partitionKey"],"kind":"Hash"}'

          if (-not (New-Container "test-crud"      "{`"id`":`"test-crud`",`"partitionKey`":${pk}}"))      { $failed = $true }
          if (-not (New-Container "harden-crud"    "{`"id`":`"harden-crud`",`"partitionKey`":${pk}}"))    { $failed = $true }
          if (-not (New-Container "test-query-adv" "{`"id`":`"test-query-adv`",`"partitionKey`":${pk}}")) { $failed = $true }
          if (-not (New-Container "test-linq"      "{`"id`":`"test-linq`",`"partitionKey`":${pk}}"))      { $failed = $true }
          if (-not (New-Container "test-batch"     "{`"id`":`"test-batch`",`"partitionKey`":${pk}}"))     { $failed = $true }
          if (-not (New-Container "test-bulk"      "{`"id`":`"test-bulk`",`"partitionKey`":${pk}}"))      { $failed = $true }
          if (-not (New-Container "test-pk"        "{`"id`":`"test-pk`",`"partitionKey`":${pk}}"))        { $failed = $true }
          if (-not (New-Container "containerA"     "{`"id`":`"containerA`",`"partitionKey`":${pk}}"))     { $failed = $true }
          if (-not (New-Container "containerB"     "{`"id`":`"containerB`",`"partitionKey`":${pk}}"))     { $failed = $true }
          if (-not (New-Container "pknone-test"    "{`"id`":`"pknone-test`",`"partitionKey`":${pk}}"))    { $failed = $true }

          if (-not (New-Container "test-ttl" "{`"id`":`"test-ttl`",`"partitionKey`":${pk},`"defaultTtl`":2}")) { $failed = $true }

          if (-not (New-Container "num-pk-test"  '{"id":"num-pk-test","partitionKey":{"paths":["/numericPk"],"kind":"Hash"}}'))  { $failed = $true }
          if (-not (New-Container "bool-pk-test" '{"id":"bool-pk-test","partitionKey":{"paths":["/boolPk"],"kind":"Hash"}}'))    { $failed = $true }

          if (-not (New-Container "composite-test" '{"id":"composite-test","partitionKey":{"paths":["/tenantId","/userId"],"kind":"MultiHash","version":2}}')) { $failed = $true }

          if ($failed) { Write-Error "Some containers failed to create"; exit 1 }
          Write-Host "All 14 test containers pre-created. Emulator is ready."

      - name: Build
        run: dotnet build CosmosDB.InMemoryEmulator.sln --configuration Release

      - name: Run Tests (emulator-windows)
        shell: pwsh
        run: ./scripts/run-tests.ps1 -Target emulator-windows -Project integration

      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-emulator-windows
          path: test-results/

  compare:
    needs: [test-inmemory, test-emulator-linux, test-windows]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Download all TRX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: trx-*
          path: test-results/
          merge-multiple: true

      - name: Parity Report
        shell: pwsh
        run: ./scripts/compare-trx.ps1 -ResultsDir test-results -OutputFormat markdown >> $env:GITHUB_STEP_SUMMARY

      - name: Upload Combined Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-results
          path: test-results/
