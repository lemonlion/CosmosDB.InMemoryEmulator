name: Emulator Benchmark

on:
  workflow_dispatch:

jobs:
  emulator-performance-tests:
    runs-on: ubuntu-latest
    env:
      EMULATOR_LOAD_TEST_RPS: 50
      EMULATOR_LOAD_TEST_DURATION_SECONDS: 60
    services:
      cosmosdb:
        image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator
        ports:
          - 8081:8081
          - 10250-10256:10250-10256
        env:
          AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 3
          AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
          AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "127.0.0.1"
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Wait for Cosmos DB Emulator
        run: |
          echo "Waiting for Cosmos DB Emulator to be ready..."
          timeout=300
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -sk https://localhost:8081/_explorer/emulator.pem > /dev/null 2>&1; then
              echo "Emulator is ready after ${elapsed}s"
              break
            fi
            sleep 5
            elapsed=$((elapsed + 5))
            echo "Still waiting... (${elapsed}s)"
          done
          if [ $elapsed -ge $timeout ]; then
            echo "::error::Cosmos DB Emulator did not start within ${timeout}s"
            exit 1
          fi

      - name: Build
        run: dotnet build CosmosDB.InMemoryEmulator.sln --configuration Release

      - name: Emulator Performance Tests
        run: dotnet test tests/CosmosDB.InMemoryEmulator.Tests.Performance --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed" --filter "FullyQualifiedName~EmulatorLoadTests"
