<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Background: deep space navy to purple -->
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1B0D3E"/>
    </linearGradient>
    <!-- Chip outline: azure cyan to blue -->
    <linearGradient id="chip" x1="64" y1="24" x2="64" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50E6FF"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <!-- Database cylinder: blue to purple -->
    <linearGradient id="db" x1="64" y1="42" x2="64" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50E6FF"/>
      <stop offset="50%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#7B2D8E"/>
    </linearGradient>
    <!-- Database fill glow -->
    <linearGradient id="dbfill" x1="64" y1="42" x2="64" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0078D4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7B2D8E" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Subtle background glow -->
    <radialGradient id="glow" cx="64" cy="62" r="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0078D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0078D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Subtle center glow -->
  <circle cx="64" cy="62" r="40" fill="url(#glow)"/>

  <!-- ===== MEMORY CHIP ===== -->
  <!-- Chip body -->
  <rect x="32" y="24" width="64" height="80" rx="5" fill="none" stroke="url(#chip)" stroke-width="2.5"/>

  <!-- Chip notch (semicircle cutout at top center) -->
  <path d="M56 24 A8 8 0 0 1 72 24" fill="#0D1B3E" stroke="url(#chip)" stroke-width="2.5"/>

  <!-- Pins — left side -->
  <rect x="18" y="36" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.85"/>
  <rect x="18" y="48" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.70"/>
  <rect x="18" y="60" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.55"/>
  <rect x="18" y="72" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.45"/>
  <rect x="18" y="84" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.35"/>

  <!-- Pins — right side -->
  <rect x="94" y="36" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.85"/>
  <rect x="94" y="48" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.70"/>
  <rect x="94" y="60" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.55"/>
  <rect x="94" y="72" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.45"/>
  <rect x="94" y="84" width="16" height="3" rx="1.5" fill="#50E6FF" opacity="0.35"/>

  <!-- ===== DATABASE CYLINDER ===== -->
  <!-- Cylinder body fill -->
  <path d="M46 50 v22 a18 7 0 0 0 36 0 v-22" fill="url(#dbfill)"/>
  <!-- Bottom ellipse fill -->
  <ellipse cx="64" cy="72" rx="18" ry="7" fill="url(#dbfill)"/>

  <!-- Cylinder strokes -->
  <ellipse cx="64" cy="50" rx="18" ry="7" fill="url(#dbfill)" stroke="url(#db)" stroke-width="1.8"/>
  <line x1="46" y1="50" x2="46" y2="72" stroke="url(#db)" stroke-width="1.8"/>
  <line x1="82" y1="50" x2="82" y2="72" stroke="url(#db)" stroke-width="1.8"/>
  <path d="M46 72 a18 7 0 0 0 36 0" fill="none" stroke="url(#db)" stroke-width="1.8"/>

  <!-- Middle data shelf line -->
  <path d="M46 61 a18 7 0 0 0 36 0" fill="none" stroke="url(#db)" stroke-width="1" opacity="0.45"/>

  <!-- ===== ORBITAL RING ===== -->
  <ellipse cx="64" cy="60" rx="25" ry="9" fill="none" stroke="#B4009E" stroke-width="1.3" opacity="0.55" transform="rotate(-28 64 60)"/>
  <!-- Orbital dot (small planet) -->
  <circle cx="88" cy="51" r="2.8" fill="#B4009E" opacity="0.85"/>
  <circle cx="88" cy="51" r="1.4" fill="#E070D0" opacity="0.9"/>

  <!-- ===== STARS ===== -->
  <circle cx="17" cy="15" r="1.3" fill="#50E6FF" opacity="0.6"/>
  <circle cx="111" cy="13" r="0.9" fill="#B4009E" opacity="0.55"/>
  <circle cx="12" cy="112" r="0.9" fill="#50E6FF" opacity="0.4"/>
  <circle cx="115" cy="114" r="1.1" fill="#B4009E" opacity="0.5"/>
  <circle cx="22" cy="65" r="0.6" fill="#50E6FF" opacity="0.3"/>
  <circle cx="106" cy="98" r="0.7" fill="#E070D0" opacity="0.35"/>
</svg>
